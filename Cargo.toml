[package]
name = "oxideav-mjpeg"
version = "0.0.3"
edition = "2021"
rust-version = "1.80"
license = "MIT"
repository = "https://github.com/OxideAV/oxideav-mjpeg"
authors = ["Mark Karpeles"]
description = "Pure-Rust baseline JPEG / Motion-JPEG codec for oxideav"

readme = "README.md"
homepage = "https://github.com/OxideAV/oxideav-mjpeg"
keywords = ["multimedia", "mjpeg", "jpeg", "video", "codec"]
categories = ["multimedia::encoding", "multimedia::video"]

[dependencies]
oxideav-core = "0.0"
oxideav-codec = "0.0"
oxideav-container = "0.0"
